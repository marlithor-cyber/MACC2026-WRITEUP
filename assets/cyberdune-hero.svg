<svg width="1400" height="320" viewBox="0 0 1400 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f">
        <animate attributeName="stop-color" values="#07111f;#0a1630;#07111f" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#11396b">
        <animate attributeName="stop-color" values="#11396b;#18558f;#11396b" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="160" x2="1400" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="320" rx="24" fill="url(#bg)"/>

  <g opacity="0.14">
    <path d="M0 60H1400" stroke="white"/>
    <path d="M0 110H1400" stroke="white"/>
    <path d="M0 160H1400" stroke="white"/>
    <path d="M0 210H1400" stroke="white"/>
    <path d="M0 260H1400" stroke="white"/>
    <path d="M120 0V320" stroke="white"/>
    <path d="M320 0V320" stroke="white"/>
    <path d="M520 0V320" stroke="white"/>
    <path d="M720 0V320" stroke="white"/>
    <path d="M920 0V320" stroke="white"/>
    <path d="M1120 0V320" stroke="white"/>
    <path d="M1320 0V320" stroke="white"/>
  </g>

  <path d="M0 160H1400" stroke="url(#line)" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0 1400;180 1220;0 1400" dur="6s" repeatCount="indefinite"/>
  </path>

  <g>
    <circle cx="1190" cy="84" r="6" fill="#22d3ee">
      <animate attributeName="cy" values="84;72;84" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1238" cy="84" r="6" fill="#38bdf8">
      <animate attributeName="cy" values="84;96;84" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1286" cy="84" r="6" fill="#93c5fd">
      <animate attributeName="cy" values="84;72;84" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.95;0.45" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="82" y="110" fill="#9BD7FF" font-size="22" font-family="Segoe UI, Arial, sans-serif" letter-spacing="4">MACC 2026 NATIONAL CTF MOROCCO</text>
  <text x="80" y="175" fill="white" font-size="64" font-weight="700" font-family="Segoe UI, Arial, sans-serif">CYBERDUNE CLUB</text>
  <text x="82" y="224" fill="#D9F5FF" font-size="28" font-family="Segoe UI, Arial, sans-serif">Finalist Writeups • ESTG, Ibn Zohr University • Guelmim-Oued Noun</text>
  <text x="82" y="266" fill="#7DD3FC" font-size="20" font-family="Segoe UI, Arial, sans-serif">Top 8 / 38 finalists • Top 8 / 1,156 teams overall</text>

  <g opacity="0.9">
    <rect x="1064" y="154" width="238" height="84" rx="16" fill="#081425" stroke="#1D4ED8"/>
    <text x="1092" y="190" fill="#93C5FD" font-size="18" font-family="Segoe UI, Arial, sans-serif">REGIONAL STATUS</text>
    <text x="1092" y="220" fill="white" font-size="22" font-weight="700" font-family="Segoe UI, Arial, sans-serif">#1 GUELMIM-OUED NOUN</text>
  </g>
</svg>
